name: Deploy to GZ Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o jcp-mcp-server-linux-amd64 main.go sse_server.go

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 创建目录
            mkdir -p /opt/jcp-mcp-server
            cd /opt/jcp-mcp-server

            # 备份旧版本
            if [ -f jcp-mcp-server ]; then
              mv jcp-mcp-server jcp-mcp-server.backup
            fi

      - name: Upload binary to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "jcp-mcp-server-linux-amd64"
          target: "/opt/jcp-mcp-server/"

      - name: Start service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/jcp-mcp-server

            # 重命名二进制文件
            mv jcp-mcp-server-linux-amd64 jcp-mcp-server
            chmod +x jcp-mcp-server

            # 创建 systemd 服务（如果不存在）
            if [ ! -f /etc/systemd/system/jcp-mcp-server.service ]; then
              cat > /etc/systemd/system/jcp-mcp-server.service << 'EOF'
            [Unit]
            Description=JCP MCP Server
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/jcp-mcp-server
            ExecStart=/opt/jcp-mcp-server/jcp-mcp-server -mode=sse
            Restart=always
            RestartSec=5
            Environment="MCP_MODE=sse"
            Environment="PORT=8080"

            [Install]
            WantedBy=multi-user.target
            EOF

              systemctl daemon-reload
              systemctl enable jcp-mcp-server
            fi

            # 启动/重启服务
            systemctl restart jcp-mcp-server

            # 等待服务启动
            sleep 3

            # 检查状态
            if systemctl is-active --quiet jcp-mcp-server; then
              echo "✅ 服务启动成功"
              echo "📋 服务地址:"
              echo "   - SSE: http://${{ secrets.SERVER_HOST }}:8080/sse"
              echo "   - Health: http://${{ secrets.SERVER_HOST }}:8080/health"
            else
              echo "❌ 服务启动失败"
              journalctl -u jcp-mcp-server -n 20 --no-pager
              exit 1
            fi

            # 配置防火墙
            if command -v ufw &> /dev/null; then
              ufw allow 8080/tcp > /dev/null 2>&1 || true
            fi

            # 清理备份
            rm -f jcp-mcp-server.backup

      - name: Health check
        run: |
          sleep 5
          curl -f http://${{ secrets.SERVER_HOST }}:8080/health || exit 1
          echo "✅ 健康检查通过"
